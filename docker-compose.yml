services:
  nginx:
    image: nginx:alpine
    ports:
      - "7755:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./seeds:/seeds:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - RSSHUB_BASE_URL=http://rsshub:1200
    depends_on:
      - ollama
      - rsshub
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - ORIGIN=http://localhost:7755
    depends_on:
      - backend
    restart: unless-stopped

  rsshub:
    image: diygod/rsshub:latest
    expose:
      - "1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=600
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
